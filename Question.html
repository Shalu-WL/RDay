<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R Day</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;700&display=swap"
    />

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎀</text></svg>"
    />
    <style>
      
      p{
        font-family: 'Fredoka', sans-serif;
      }


      /* Body */
      body {
        height: 100vh;
        font-family: "Poppins", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #edf4ff, #dbeafe, #c7d2fe, #bfdbfe);
        overflow: hidden;
        transition: 0.6s;
      }

      /* Main Box */
      .container {
        text-align: center;
        z-index: 2;
      }

      /* Heading */
      .container h1 {
        font-family: "Pacifico", cursive;
        font-size: 52px;
        color: #2563eb;
      }

      /* Paragraph */
      .container p {
        margin-top: 10px;
        font-size: 24px;
        color: #334155;
      }

      /* Buttons */
      .buttons {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      button {
        padding: 14px 30px;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
      }

      /* Yes */
      .yes {
        background: white;
        color: #2563eb;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15);
      }

      .yes:hover {
        transform: scale(1.06);
      }

      /* No */
      .no {
        background: linear-gradient(135deg, #2563eb, #60a5fa);
        color: white;
      }

      /* Popup Screen */
      .video-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #eff6ff, #dbeafe, #c7d2fe, #bfdbfe);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: 0.6s;
      }

      .video-screen.show {
        opacity: 1;
        pointer-events: auto;
      }

      /* Left Side */
      .left-side {
        width: 45%;
      }

      .left-side h1 {
        font-size: 62px;
        color: #2563eb;
        font-family: "Pacifico", cursive;
      }

      .left-side p {
        font-size: 22px;
        color: #334155;
        margin-top: 20px;
        line-height: 1.8;
      }

      /* Right Video */
      .right-side {
        width: 45%;
        display: flex;
        justify-content: center;
      }

      .right-side video {
        width: 100%;
        max-width: 500px;
        height: 80vh;
        object-fit: cover;
        border-radius: 35px;
        border: 4px solid rgba(255, 255, 255, 0.9);
        box-shadow:
          0 25px 60px rgba(30, 64, 175, 0.18),
          0 0 0 1px rgba(255, 255, 255, 0.5);
      }
      

      /* Mobile */
      @media (max-width: 1000px) {
        .video-screen {
          flex-direction: column;
          text-align: center;
          gap: 30px;
          padding: 30px;
        }

        .left-side,
        .right-side {
          width: 100%;
        }

        .left-side h1 {
          font-size: 44px;
        }

        .right-side video {
          height: 55vh;
        }

        .container h1 {
          font-size: 40px;
        }
      }
    </style>
  </head>

  <body>
    <!-- First Screen -->
    <div class="container">
      <h1>One Last Question</h1>
      <p class="para">
        According to the signed agreement, one final confirmation is required.
      </p>
      <p class="para">The promised ice cream will be delivered, right?</p>

      <div class="buttons">
        <button class="yes">Yes</button>
        <button class="no" id="noBtn">No</button>
      </div>
    </div>

    <!-- Fullscreen Popup -->
    <div id="videoScreen" class="video-screen">
      <div class="left-side">
        <h1>
          She said it, That's it <br />
          Date is Fixed
        </h1>
        <p>
          Evanum Vaya Thorakka koodathu, <br />
          Kabilan Rose ah rendu round lah mudikiran, <br />" IceCream kadaiya
          Velaiku Vangurom "
        </p>
      </div>

      <div class="right-side">
        <video id="mainVideo" controls>
          <source src="Dance.mp4" type="video/mp4" />
        </video>
      </div>
    </div>

    <script>
      /* No Button Escape */
      let noBtn = document.getElementById("noBtn");

      noBtn.addEventListener("mouseover", () => {
        let x = (Math.random() - 0.5) * 300;
        let y = (Math.random() - 0.5) * 300;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;
      });

      /* Yes Button */
      let yesBtn = document.querySelector(".yes");

      yesBtn.addEventListener("click", () => {
        const screen = document.getElementById("videoScreen");
        const video = document.getElementById("mainVideo");

        screen.classList.add("show");

        video.currentTime = 0;
        video.play();

        video.onended = () => {
          document.body.style.opacity = "0";

          setTimeout(() => {
            window.location.href = "FinalPage.html";
          }, 700);
        };
      });
    </script>
  </body>
</html>
