<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R Day</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&family=Titan+One&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@400;600;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎀</text></svg>">

    <style>
      /* style.css */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        overflow: hidden;
        font-family: "Poppins", sans-serif;
        background:
          radial-gradient(circle at top left, #ffffff 0%, transparent 30%),
          radial-gradient(circle at bottom right, #b9dcff 0%, transparent 35%),
          radial-gradient(circle at center, #dff1ff 0%, transparent 45%),
          linear-gradient(
            135deg,
            #eef8ff 0%,
            #d8ecff 25%,
            #b9dcff 55%,
            #9bcaff 75%,
            #7fb7ff 100%
          );
      }

      .page {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      /* title */
      .title {
        font-family: "Titan One", sans-serif;
        font-size: 95px;
        line-height: 1;
      }

      .title span {
        display: inline-block;
        color: #69aefe;
        text-shadow:
          4px 4px #24445f,
          0 0 15px rgba(105, 174, 254, 0.35);
        opacity: 0;
        transform: translateY(60px);
        animation: drop 0.6s forwards;
        animation-delay: var(--d);
      }

      @keyframes drop {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .date {
        margin-top: 24px;
        font-size: 28px;
        font-weight: 700;
        color: #24445f;
      }

      button {
        font-family: "Outfit", sans-serif;
        margin-top: 32px;
        padding: 16px 34px;
        border: none;
        border-radius: 50px;
        font-size: 20px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #7fc8ff, #5aa6ff);
        box-shadow: 0 15px 30px rgba(90, 166, 255, 0.35);
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-4px) scale(1.05);
      }

      /* popup */
      .boxMail {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);

        display: flex;
        justify-content: center;
        align-items: center;

        opacity: 0;
        visibility: hidden;
        transform: scale(0.6);
        transition: 0.45s;
      }

      .boxMail.active {
        opacity: 1;
        visibility: visible;
        transform: scale(1);
      }

      .close {
        position: absolute;
        top: 25px;
        right: 35px;
        color: white;
        font-size: 32px;
        cursor: pointer;
        z-index: 10;
      }

      /* floating icons */
      .float {
        position: absolute;
        font-size: 28px;
        opacity: 0.65;
        animation: floatUp linear infinite;
      }

      .h1 {
        left: 10%;
        bottom: -40px;
        animation-duration: 8s;
      }

      .h2 {
        left: 25%;
        bottom: -40px;
        animation-duration: 11s;
      }

      .h3 {
        left: 50%;
        bottom: -40px;
        animation-duration: 7s;
      }

      .h4 {
        left: 72%;
        bottom: -40px;
        animation-duration: 9s;
      }

      .h5 {
        left: 88%;
        bottom: -40px;
        animation-duration: 10s;
      }

      @keyframes floatUp {
        from {
          transform: translateY(0);
          opacity: 0;
        }

        20% {
          opacity: 0.7;
        }

        to {
          transform: translateY(-110vh);
          opacity: 0;
        }
      }

      /* card */
      .boxMail-container {
        width: 720px;
        height: 460px;
        position: relative;
        perspective: 2200px;
      }

      .card1,
      .card2 {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 24px;
      }

      /* cover */
      .card1 {
        background: linear-gradient(135deg, #74bcff, #4d9cff);
        color: white;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        transform-origin: left;
        transition: 1.4s ease;
        z-index: 3;

        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      }

      .card1 h2 {
        font-family: "Titan One", sans-serif;
        font-size: 54px;
      }

      .card1 p {
        margin-top: 10px;
        font-size: 26px;
      }

      /* inside */
      .card2 {
        background: #ffffff;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
      }

      .card2-content {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px;
        gap: 20px;
      }

      .card2 h3 {
        font-family: "Great Vibes", cursive;
        font-size: 58px;
        color: #69aefe;
        margin-bottom: 18px;
      }

      .card2 p {
        color: #35556d;
        font-size: 23px;
        line-height: 1.8;
        max-width: 90%;
      }

      /* active animation */
      .boxMail.active .card1 {
        transform: rotateY(-150deg);
      }

      .boxMail.active .card2-content {
        transform: translate(20px, 20px);
      }

      .boxMail.active .boxMail-container {
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from {
          filter: drop-shadow(0 0 10px #69aefe);
        }

        to {
          filter: drop-shadow(0 0 26px #69aefe);
        }
      }

      /* mobile */
      @media (max-width: 768px) {
        .title {
          font-size: 58px;
        }

        .date {
          font-size: 22px;
        }

        button {
          font-size: 18px;
          padding: 14px 28px;
        }

        .boxMail-container {
          width: 92%;
          height: 360px;
        }

        .card1 h2 {
          font-size: 38px;
        }

        .card1 p {
          font-size: 20px;
        }

        .card2 h3 {
          font-size: 38px;
        }

        .card2 p {
          font-size: 18px;
          line-height: 1.6;
        }

        .close {
          top: 15px;
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1 class="title">
        <span style="--d: 0s">H</span>
        <span style="--d: 0.1s">A</span>
        <span style="--d: 0.2s">P</span>
        <span style="--d: 0.3s">P</span>
        <span style="--d: 0.4s">Y</span>
        <br />
        <span style="--d: 0.6s">B</span>
        <span style="--d: 0.7s">I</span>
        <span style="--d: 0.8s">R</span>
        <span style="--d: 0.9s">T</span>
        <span style="--d: 1s">H</span>
        <span style="--d: 1.1s">D</span>
        <span style="--d: 1.2s">A</span>
        <span style="--d: 1.3s">Y</span>
      </h1>

      <div class="date">Renu</div>

      <button id="openMe">Don’t Click Here</button>
    </div>

    <script>
      const openBtn = document.getElementById("openMe");

      openBtn.addEventListener("click", () => {
        document.body.style.opacity = "2";

        setTimeout(() => {
          window.location.href = "Contract.html";
        }, 500);
      });
    </script>
  </body>
</html>
