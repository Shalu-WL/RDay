<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R Day</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎀</text></svg>">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #edf4ff, #dbeafe, #c7d2fe, #bfdbfe);
        display: flex;
        justify-content: center;
        align-items: center;

        opacity: 0;
        animation: pageFade 1.4s ease forwards;
      }

      /* Page Fade In */
    @keyframes pageFade{
    from{
        opacity:0;
        transform: scale(1.02);
        filter: blur(6px);
    }
    to{
        opacity:1;
        transform: scale(1);
        filter: blur(0);
    }
}

      /* Main Layout */
      .container {
        width: 92%;
        height: 88vh; /* bottom space visible */
        display: grid;
        grid-template-columns: 1fr 0.9fr;
        gap: 60px;
        align-items: center;
      }

      /* LEFT SIDE */
      .left-side {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
      }

      /* Replace ONLY the album + card section with this */

      /* 2 ROW / 3 COLUMN GRID */
      .album {
        display: grid;
        grid-template-columns: repeat(3, 205px);
        grid-template-rows: repeat(2, 205px);
        gap: 24px;
      }

      /* Bigger Cards */
      .card {
        width: 205px;
        height: 205px;
        border: 4px solid white;
        border-radius: 30px;
        overflow: hidden;
        background: white;
        box-shadow: 0 18px 40px rgba(30, 64, 175, 0.12);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* Slight Aesthetic Rotation */
      .card:nth-child(1) {
        transform: rotate(-3deg);
      }
      .card:nth-child(2) {
        transform: rotate(2deg);
      }
      .card:nth-child(3) {
        transform: rotate(-2deg);
      }
      .card:nth-child(4) {
        transform: rotate(2deg);
      }
      .card:nth-child(5) {
        transform: rotate(-3deg);
      }
      .card:nth-child(6) {
        transform: rotate(3deg);
      }

      /* RIGHT SIDE */
      .right-side {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 9:16 Box */
      .phone-box {
        width: 360px;
        height: 78vh;
        max-height: 760px;
        border: 4px solid white;
        border-radius: 38px;
        overflow: hidden;
        background: white;
        box-shadow: 0 25px 50px rgba(30, 64, 175, 0.14);
        display: flex;
        flex-direction: column;
      }

      .phone-box img {
        width: 100%;
        height: 70%;
        object-fit: cover;
      }

      /* Text */
      .content {
        flex: 1;
        padding: 22px 24px 28px;
        text-align: center;
      }

      .content h2 {
        font-size: 28px;
        color: #2563eb;
        margin-bottom: 10px;
      }

      .content p {
        font-size: 16px;
        color: #475569;
        line-height: 1.8;
      }

      /* Responsive */
      @media (max-width: 1300px) {
        html,
        body {
          overflow: auto;
        }

        .container {
          height: auto;
          grid-template-columns: 1fr;
          gap: 40px;
          padding: 40px 0;
        }

        .album {
          grid-template-columns: repeat(2, 180px);
          grid-template-rows: auto;
        }

        .phone-box {
          margin: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left-side">
        <div class="album">
          <div class="card"><img src="Images/img1.jpg" /></div>
          <div class="card"><img src="Images/img2.jpg" /></div>
          <div class="card"><img src="Images/img3.jpg" /></div>
          <div class="card"><img src="Images/img4.jpg" /></div>
          <div class="card"><img src="Images/img5.jpg" /></div>
          <div class="card"><img src="Images/img6.jpg" /></div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right-side">
        <div class="phone-box">
          <img src="Images/img7.jpg" />

          <div class="content">
            <h2>Birthday Girl</h2>
            <p>
              Don’t forget my promised <br />
              Ice Cream
            </p>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
