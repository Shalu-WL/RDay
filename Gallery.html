<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Birthday Memory Gallery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(135deg, #dff6ff, #bde8ff, #dff6ff);
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }
      h1 {
        color: #4f8cff;
        margin-bottom: 10px;
      }
      .counter {
        font-weight: bold;
        color: #35507a;
        margin-bottom: 25px;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        max-width: 1100px;
        margin: auto;
      }
      .polaroid {
        background: #fff;
        padding: 12px 12px 20px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        transition: 0.3s;
      }
      .polaroid:hover {
        transform: translateY(-5px);
      }
      .polaroid img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 5px;
      }
      .caption {
        margin-top: 10px;
        font-weight: bold;
        color: #4f8cff;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: none;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .card {
        width: 340px;
        height: 450px;
        position: relative;
        transform-style: preserve-3d;
        transition: 0.8s;
        cursor: pointer;
      }
      .card.flip {
        transform: rotateY(180deg);
      }
      .side {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        background: white;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      .side img {
        width: 100%;
        height: 300px;
        object-fit: cover;
        border-radius: 10px;
      }
      .back {
        transform: rotateY(180deg);
        color: #35507a;
        font-size: 1.2rem;
        font-weight: bold;
        line-height: 1.6;
      }
      #unlock {
        display: none;
        margin-top: 20px;
        color: #4f8cff;
        font-size: 1.4rem;
        font-weight: bold;
      }
      button {
        margin-top: 20px;

        padding: 14px 35px;

        border: none;

        border-radius: 40px;

        background: #4f8cff;

        color: white;

        font-size: 1rem;

        transition: 0.3s;
      }

      button:disabled {
        opacity: 0.4;

        cursor: not-allowed;
      }

      button.enabled {
        opacity: 1;

        cursor: pointer;

        box-shadow: 0 0 20px rgba(79, 140, 255, 0.5);
      }

      button.enabled:hover {
        transform: translateY(-3px);
      }

      @media (max-width: 800px) {
        .gallery {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 550px) {
        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="counter">Images Revealed: <span id="count">0</span>/6</div>

    <div class="gallery">
      <div class="polaroid" onclick="openCard(0)">
        <img src="Images/R1.jpg" />
        <div class="caption">Cute Smile 😊</div>
      </div>
      <div class="polaroid" onclick="openCard(1)">
        <img src="Images/R2.jpg" />
        <div class="caption">Queen Mode 👑</div>
      </div>
      <div class="polaroid" onclick="openCard(2)">
        <img src="Images/R3.jpg" />
        <div class="caption">Singer 🎤</div>
      </div>
      <div class="polaroid" onclick="openCard(3)">
        <img src="Images/R4.jpg" />
        <div class="caption">Sunshine 🌸</div>
      </div>
      <div class="polaroid" onclick="openCard(4)">
        <img src="Images/R5.jpg" />
        <div class="caption">Adorable 💖</div>
      </div>
      <div class="polaroid" onclick="openCard(5)">
        <img src="Images/R6.jpg" />
        <div class="caption">Main Character ✨</div>
      </div>
    </div>

    <div id="unlock">✨ Birthday Analysis Complete ✨</div>
    <button id="continueBtn" onclick="nextPage()" disabled>Continue ➜</button>

    <div class="modal" id="modal" onclick="closeModal(event)">
      <div class="card" id="card">
        <div class="side front">
          <img id="modalImg" src="" />
          <p style="margin-top: 10px">Click to reveal 💙</p>
        </div>
        <div class="side back" id="message"></div>
      </div>
    </div>

    <script>
      const msgs = [
        "🎤 Talenet Report<br><br> Exceptional singing ability detected. <br><br> Side effects may include people requesting <br>'Just one more song' ",
        "🩺 Medical Report<br><br>Subject possesses <br>the rare ability<br>to make people feel better<br>without prescribing any medicine.",
        "🎤 Vocal Report<br><br>Subject's voice has been <br> classified as <br> 'Play Again Immediately'",
        "🌸 Justice for momos<br><br>Several plates of momos have mysteriously disappeared <br><br> Prime Suspect:<br> You know who!",
        "💖 Crime Report<br><br>Several hearts have been reported missing today.",
        "💌 Secret Message <br><br>You are Awesome. Don't tell anyone",
      ];

      let opened = new Set();
      let current = 0;

      function openCard(i) {
        current = i;
        document.getElementById("modal").style.display = "flex";
        document.getElementById("modalImg").src = "Images/R" + (i + 1) + ".jpg";
        document.getElementById("message").innerHTML = msgs[i];
        document.getElementById("card").classList.remove("flip");
      }

      document.getElementById("card").onclick = function (e) {
        e.stopPropagation();
        this.classList.toggle("flip");

        if (!opened.has(current)) {
          opened.add(current);
          document.getElementById("count").textContent = opened.size;

          if (opened.size === 6) {
            document.getElementById("unlock").style.display = "block";

            const btn = document.getElementById("continueBtn");

            btn.classList.add("enabled");

            btn.disabled = false;

            btn.innerHTML = "Continue ➜";
          }
        }
      };

      function closeModal(e) {
        if (e.target.id === "modal") {
          document.getElementById("modal").style.display = "none";
        }
      }
      function nextPage() {
        //alert("Heart Collection Approved 💖");

        window.location.href = "page2.html";
      
    }
    </script>
  </body>
</html>
